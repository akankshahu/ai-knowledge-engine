version: '3.9'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: knowledge_db
    environment:
      POSTGRES_USER: knowledge_user
      POSTGRES_PASSWORD: knowledge_pass
      POSTGRES_DB: knowledge_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledge_user -d knowledge_engine"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: knowledge_cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: knowledge_api
    environment:
      DATABASE_URL: "postgresql://knowledge_user:knowledge_pass@postgres:5432/knowledge_engine"
      CELERY_BROKER: "redis://redis:6379/0"
      CELERY_BACKEND: "redis://redis:6379/1"
      LLM_PROVIDER: "mock"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: knowledge_worker
    environment:
      DATABASE_URL: "postgresql://knowledge_user:knowledge_pass@postgres:5432/knowledge_engine"
      CELERY_BROKER: "redis://redis:6379/0"
      CELERY_BACKEND: "redis://redis:6379/1"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
    command: celery -A app.tasks.celery_app worker --loglevel=info

volumes:
  postgres_data: